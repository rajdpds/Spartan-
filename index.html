<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARSENIC GYM</title>

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:'Oswald',sans-serif;
    background:#000;
    color:#ff0000;
}

/* HEADER */
header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 40px;
}

.logo{
    font-size:36px;
    font-weight:700;
}

.join-btn{
    background:transparent;
    border:2px solid #ff0000;
    color:#ff0000;
    padding:10px 25px;
    border-radius:30px;
    cursor:pointer;
    transition:.3s;
}

.join-btn:hover{
    background:#ff0000;
    color:#000;
}

/* HERO IMAGE FIXED RATIO */
.hero{
    width:100%;
    max-height:500px;
    overflow:hidden;
}

.hero img{
    width:100%;
    height:500px;
    object-fit:cover;
    object-position:center 30%;
}

/* EQUIPMENT GRID 2x5 */
.equipment-section{
    width:95%;
    max-width:1400px;
    margin:60px auto;
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:40px;
}

.equipment-card{
    background:#111;
    border:1px solid #ff0000;
    border-radius:25px;
    padding:25px;
    text-align:center;
    transition:.3s;
}

.equipment-card img{
    width:100%;
    height:200px; /* bigger rectangle */
    object-fit:cover;
    border-radius:15px;
}

.equipment-card p{
    margin-top:15px;
    font-size:20px;
    font-weight:600;
}

.equipment-card:hover{
    transform:translateY(-8px);
    box-shadow:0 0 25px #ff0000;
}

/* PLANS */
.card{
    width:90%;
    max-width:1200px;
    margin:60px auto;
    padding:40px;
    background:#111;
    border-radius:25px;
    border:1px solid #ff0000;
    text-align:center;
    font-size:22px;
}

/* LOCATION */
.location a{
    color:#ff0000;
    text-decoration:none;
}

.location a:hover{
    text-decoration:underline;
}

/* RESPONSIVE */
@media(max-width:1000px){
    .equipment-section{
        grid-template-columns:repeat(2,1fr);
    }
    .hero img{
        height:350px;
    }
}

</style>
</head>
<body>

<header>
    <div class="logo">ARSENIC GYM</div>
    <button class="join-btn" onclick="payNow()">JOIN</button>
</header>

<!-- HERO IMAGE -->
<div class="hero">
    <img src="header.jpg" alt="Gym Header">
</div>

<!-- EQUIPMENT GRID (2x5 stays same) -->
<div class="equipment-section">

    <div class="equipment-card">
        <img src="bike.jpg">
        <p>Stationary Bike</p>
    </div>

    <div class="equipment-card">
        <img src="kettlebell.jpg">
        <p>Kettlebell</p>
    </div>

    <div class="equipment-card">
        <img src="barbell.jpg">
        <p>Barbell</p>
    </div>

    <div class="equipment-card">
        <img src="lat.jpg">
        <p>Lat Pulldown</p>
    </div>

    <div class="equipment-card">
        <img src="bench.jpg">
        <p>Bench Press</p>
    </div>

    <div class="equipment-card">
        <img src="squat.jpg">
        <p>Squat Rack</p>
    </div>

    <div class="equipment-card">
        <img src="dumbbell.jpg">
        <p>Dumbbells</p>
    </div>

    <div class="equipment-card">
        <img src="treadmill.jpg">
        <p>Treadmill</p>
    </div>

    <div class="equipment-card">
        <img src="cable.jpg">
        <p>Cable Machine</p>
    </div>

    <div class="equipment-card">
        <img src="smith.jpg">
        <p>Smith Machine</p>
    </div>

</div>

<!-- PLANS -->
<div class="card">
    About Plans<br><br>
    Joining – 1500/-<br>
    Monthly – 500/-
</div>

<!-- LOCATION -->
<div class="card location">
    📍 <a href="https://maps.app.goo.gl/AsagDupfQSvw7a4j6?g_st=aw" target="_blank">
        View Gym Location on Google Maps
    </a>
</div>

<script>
function payNow(){
    window.location.href="upi://pay?pa=8638136604@ibl&pn=ARSENICGYM&cu=INR";
}
</script>

</body>
</html>
